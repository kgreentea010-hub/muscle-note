<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレノート</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f5;
margin:0;
padding:16px;
}

h1{text-align:center;}

.card{
background:#fff;
padding:12px;
margin-bottom:12px;
border-radius:8px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:6px;
}

.record{margin-top:6px;}

.delete-btn{
margin-left:8px;
padding:4px 8px;
font-size:12px;
background:#e53935;
color:white;
border:none;
border-radius:4px;
}
</style>
</head>

<body>

<h1>筋トレノート</h1>

<div class="card">

<input id="date" type="date">

<select id="part">
<option value="">部位を選択</option>
<option value="胸">胸</option>
<option value="背中">背中</option>
<option value="脚">脚</option>
<option value="肩">肩</option>
<option value="腕">腕</option>
<option value="腹">腹</option>
</select>

<input id="menu" placeholder="種目">
<input id="weight" placeholder="重量(kg)" type="number">
<input id="reps" placeholder="回数" type="number">

<button onclick="addRecord()">記録する</button>

</div>


<div class="card">
<h2>記録一覧</h2>
<div id="records"></div>
</div>


<script>

const recordsEl=document.getElementById("records");
const dateEl=document.getElementById("date");
const menuEl=document.getElementById("menu");
const weightEl=document.getElementById("weight");
const repsEl=document.getElementById("reps");
const partEl=document.getElementById("part");

let records=JSON.parse(localStorage.getItem("records"))||[];

function setToday(){
dateEl.value=new Date().toISOString().slice(0,10);
}

function addRecord(){

if(!partEl.value){
alert("部位を選択してください");
return;
}

if(!menuEl.value||!weightEl.value||!repsEl.value)return;

records.push({
date:dateEl.value,
part:partEl.value,
menu:menuEl.value,
weight:Number(weightEl.value),
reps:Number(repsEl.value)
});

repsEl.value="";

render();

}

function deleteRecord(record){

records=records.filter(r=>
!(r.date===record.date&&
r.menu===record.menu&&
r.weight===record.weight&&
r.reps===record.reps)
);

render();

}

function render(){

recordsEl.innerHTML="";

const grouped={};

records.forEach(r=>{

if(!grouped[r.date])grouped[r.date]={};

if(!grouped[r.date][r.part])grouped[r.date][r.part]={};

if(!grouped[r.date][r.part][r.menu])grouped[r.date][r.part][r.menu]=[];

grouped[r.date][r.part][r.menu].push(r);

});

const dates=Object.keys(grouped).sort().reverse();

dates.forEach(date=>{

const title=document.createElement("h3");
title.textContent=date;
recordsEl.appendChild(title);

Object.keys(grouped[date]).forEach(part=>{

const partTitle=document.createElement("div");
partTitle.textContent="【"+part+"】";
partTitle.style.fontWeight="bold";
recordsEl.appendChild(partTitle);

Object.keys(grouped[date][part]).forEach(menu=>{

const menuTitle=document.createElement("div");
menuTitle.textContent="▼ "+menu;
recordsEl.appendChild(menuTitle);

const sets=grouped[date][part][menu];

sets.forEach((r,i)=>{

const div=document.createElement("div");
div.className="record";

div.innerHTML=
r.weight+"kg × "+r.reps+"回 ("+(i+1)+"/"+sets.length+"セット目) "+
"<button class='delete-btn'>削除</button>";

div.querySelector("button").onclick=()=>{
if(confirm("削除しますか？"))deleteRecord(r);
};

recordsEl.appendChild(div);

});

});

});

});

localStorage.setItem("records",JSON.stringify(records));

}

setToday();
render();

</script>

</body>
</html>
