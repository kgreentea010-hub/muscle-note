<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレノート</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f5;
margin:0;
padding:16px;
}

h1{text-align:center;}

.card{
background:#fff;
padding:12px;
margin-bottom:12px;
border-radius:8px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:6px;
}

.record{
margin-top:6px;
}

.delete-btn{
margin-top:4px;
background:#e53935;
color:white;
border:none;
padding:6px;
border-radius:6px;
width:100%;
}

label{
display:flex;
align-items:center;
gap:8px;
width:auto;
}

label input{
width:auto;
}

.summary{
background:#ffecec;
padding:6px;
border-radius:6px;
margin-top:6px;
}

</style>
</head>

<body>

<h1>筋トレノート</h1>

<div class="card">

<input id="date" type="date">

<select id="part">
<option value="">部位を選択</option>
<option value="胸">胸</option>
<option value="背中">背中</option>
<option value="脚">脚</option>
<option value="肩">肩</option>
<option value="腕">腕</option>
<option value="腹">腹</option>
</select>

<input id="menu" placeholder="種目">

<input id="weight" type="number" placeholder="重量">

<input id="reps" type="number" placeholder="回数">

<button onclick="addRecord()">記録する</button>

<label>
<input type="checkbox" id="autoRest">
記録後に自動でレストタイマー開始
</label>

</div>


<div class="card">

<h2>レストタイマー</h2>

<input type="range" id="timerRange" min="10" max="300" step="10" value="60">

<div id="timerLabel">60 秒</div>

<button id="startTimer">スタート</button>
<button id="stopTimer">停止</button>

</div>


<div class="card">

<h2>記録一覧</h2>

<div id="records"></div>

</div>

<script>

const recordsEl=document.getElementById("records")
const dateEl=document.getElementById("date")
const menuEl=document.getElementById("menu")
const weightEl=document.getElementById("weight")
const repsEl=document.getElementById("reps")
const partEl=document.getElementById("part")
const autoRestEl=document.getElementById("autoRest")

const timerRange=document.getElementById("timerRange")
const timerLabel=document.getElementById("timerLabel")
const startBtn=document.getElementById("startTimer")
const stopBtn=document.getElementById("stopTimer")

let records=JSON.parse(localStorage.getItem("records"))||[]

let timerId=null
let remaining=0


function startRestTimer(){

if(timerId)return

remaining=Number(timerRange.value)

timerLabel.textContent=remaining+" 秒"

timerId=setInterval(()=>{

remaining--

timerLabel.textContent=remaining+" 秒"

if(remaining<=0){

clearInterval(timerId)
timerId=null

timerLabel.textContent="休憩終了！"

}

},1000)

}

startBtn.onclick=startRestTimer

stopBtn.onclick=()=>{

clearInterval(timerId)
timerId=null
timerLabel.textContent="停止"

}

timerRange.oninput=()=>{

timerLabel.textContent=timerRange.value+" 秒"

}


function setToday(){

dateEl.value=new Date().toISOString().slice(0,10)

}


function addRecord(){

if(!menuEl.value||!weightEl.value||!repsEl.value)return

records.push({

date:dateEl.value,
part:partEl.value,
menu:menuEl.value,
weight:Number(weightEl.value),
reps:Number(repsEl.value)

})

repsEl.value=""

render()

if(autoRestEl.checked)startRestTimer()

}


function deleteRecord(index){

records.splice(index,1)

render()

}


function render(){

recordsEl.innerHTML=""

const grouped={}

records.forEach((r,i)=>{

if(!grouped[r.date])grouped[r.date]=[]

grouped[r.date].push({...r,index:i})

})

const dates=Object.keys(grouped).sort().reverse()

dates.forEach(date=>{

const dayRecords=grouped[date]

const sets=dayRecords.length

const vol=dayRecords.reduce((s,r)=>s+r.weight*r.reps,0)

const parts=[...new Set(dayRecords.map(r=>r.part))]

const summary=document.createElement("div")

summary.className="summary"

summary.innerHTML=

`<b>${date}</b><br>${parts.join("・")}｜${sets}セット｜総Vol ${vol}kg`

recordsEl.appendChild(summary)

dayRecords.forEach(r=>{

const div=document.createElement("div")

div.className="record"

div.innerHTML=

`${r.menu} ${r.weight}kg × ${r.reps}回
<button class="delete-btn">削除</button>`

div.querySelector("button").onclick=()=>deleteRecord(r.index)

recordsEl.appendChild(div)

})

})

localStorage.setItem("records",JSON.stringify(records))

}

setToday()

render()

</script>

</body>
</html>
